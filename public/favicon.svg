<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="url(#bgGradient)"/>

  <!-- Red circle (top-left) -->
  <circle cx="60" cy="60" r="35" fill="#FF3B30"/>

  <!-- Blue circle (top-right) -->
  <circle cx="140" cy="60" r="35" fill="#007AFF"/>

  <!-- Yellow circle (bottom-left) -->
  <circle cx="60" cy="140" r="35" fill="#FFD60A"/>

  <!-- Green circle (bottom-right) -->
  <circle cx="140" cy="140" r="35" fill="#30D158"/>
</svg>